<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Photo Separator</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Arial, sans-serif;
        }
        #loading-overlay .spinner {
            width: 50px; height: 50px;
            border: 5px solid #eee;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loading-overlay p {
            color: #333;
            font-size: 16px;
            margin: 5px 0;
        }
        #loading-overlay small {
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p><strong>Processing...</strong></p>
    <small>Please wait</small>
</div>

<div class="container">
    <h1>Face Photo Separator</h1>
    <p class="subtitle">
        Upload a ZIP file containing photos.<br>
        The system will group photos of the same person.
    </p>

    <form id="uploadForm" onsubmit="handleSubmit(event)">
        <label class="upload-box">
            <input type="file" name="file" accept=".zip" required id="fileInput">
            <span>Select ZIP File</span>
        </label>
        <button type="submit">Upload & Process</button>
    </form>

    <p class="note">
        ⚠️ Processing time depends on number of photos and faces.
    </p>
</div>

<script>
    async function handleSubmit(e) {
        e.preventDefault();
        
        const fileInput = document.getElementById('fileInput');
        const form = document.getElementById('uploadForm');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        if (!fileInput.files.length) {
            alert('Please select a file');
            return;
        }

        // Show loading
        loadingOverlay.style.display = 'flex';
        
        const formData = new FormData(form);
        
        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            
            if (!response.ok) {
                throw new Error('Upload failed');
            }
            
            // Get the blob and create download link
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'separated_photos.zip';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
            
            // Hide loading after download starts
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
            }, 2000);
            
        } catch (error) {
            alert('Error: ' + error.message);
            loadingOverlay.style.display = 'none';
        }
    }
</script>

</body>
</html>
